<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro Achopet</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

.box{
max-width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
}

input, textarea{
width:100%;
padding:10px;
margin:6px 0;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
background:#25D366;
color:white;
border:0;
border-radius:10px;
font-size:18px;
}
</style>

</head>

<body>

<div class="box">

<h1>🐾 Achopet</h1>

<input id="nome" placeholder="Nome do pet">

<input id="responsavel" placeholder="Responsável">

<input id="telefone" placeholder="WhatsApp">

<input id="tipo" placeholder="Tipo sanguíneo">

<textarea id="alergia" placeholder="Alergias"></textarea>

<textarea id="tratamento" placeholder="Tratamentos"></textarea>

<textarea id="obs" placeholder="Observações"></textarea>


<button onclick="cadastrar()">
Salvar cadastro
</button>


</div>


<script>

function cadastrar(){

let nome = document.getElementById("nome").value;

alert("Cadastro recebido do pet: " + nome);

}

</script>


</body>
</html>
