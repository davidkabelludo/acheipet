
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro Achopet</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  padding: 20px;
}

.card {
  background: white;
  max-width: 400px;
  margin: auto;
  padding: 25px;
  border-radius: 15px;
}

h1 {
  text-align: center;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 12px;
  background: #25D366;
  color: white;
  border: none;
  border-radius: 10px;
}
</style>

</head>

<body>

<div class="card">

<h1>🐾 Cadastro Achopet</h1>

<input placeholder="Nome do pet">

<input placeholder="Raça">

<input placeholder="Nome do responsável">

<input placeholder="WhatsApp">

<textarea placeholder="Mensagem para quem encontrar"></textarea>

<button>Salvar cadastro</button>

</div>

</body>
</html>
