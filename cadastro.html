<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro Achopet</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f2f2f2;
    padding:20px;
}

.box{
    max-width:400px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:6px 0;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    background:#25D366;
    color:white;
    border:0;
    border-radius:10px;
    font-size:18px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="box">

<h1>🐾 Achopet</h1>

<input id="nome" placeholder="Nome do pet">

<input id="raca" placeholder="Raça">

<input id="responsavel" placeholder="Responsável">

<input id="telefone" placeholder="WhatsApp">

<input id="tipo" placeholder="Tipo sanguíneo">

<textarea id="alergia" placeholder="Alergias"></textarea>

<textarea id="tratamento" placeholder="Tratamentos"></textarea>

<textarea id="mensagem" placeholder="Mensagem para quem encontrar"></textarea>

<button onclick="cadastrar()">
Salvar cadastro
</button>

</div>


<script>

const supabaseUrl = "https://kadigolmlkhhwwhlyqpd.supabase.co";

const supabaseKey = "sb_publishable_pAUPbkDPg0EX45fjHGMAgQ_erEKCPXN";

const banco = window.supabase.createClient(
    supabaseUrl,
    supabaseKey
);


async function cadastrar(){

const {error} = await banco
.from("pets")
.insert([{

Nome_pet: document.getElementById("nome").value,

Raca: document.getElementById("raca").value,

Responsavel: document.getElementById("responsavel").value,

Whatsapp: document.getElementById("telefone").value,

Tipo_sanguineo: document.getElementById("tipo").value,

Alergias: document.getElementById("alergia").value,

Tratamentos: document.getElementById("tratamento").value,

Mensagem: document.getElementById("mensagem").value,

Foto: ""

}]);


if(error){

alert("Erro ao salvar: " + error.message);

return;

}


alert("🐾 Cadastro salvo com sucesso!");

}

</script>

</body>
</html>
