<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro Achopet</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f2f2f2;
    padding:20px;
}

.box{
    max-width:400px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

input, textarea{
    width:100%;
    padding:10px;
    margin:6px 0;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    background:#25D366;
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body>

<div class="box">

<h1>🐾 Achopet</h1>

<input id="nome" placeholder="Nome do pet">

<input id="responsavel" placeholder="Responsável">

<input id="telefone" placeholder="WhatsApp">

<input id="tipo" placeholder="Tipo sanguíneo">

<textarea id="alergia" placeholder="Alergias"></textarea>

<textarea id="tratamento" placeholder="Tratamentos"></textarea>

<textarea id="mensagem" placeholder="Mensagem para quem encontrar o pet"></textarea>

<button onclick="cadastrar()"function cadastrar(){

alert("Botão clicou!");
Salvar cadastro
</button>

</div>

<script>

const supabaseUrl = "https://kadigolmlkhhwwhlyqpd.supabase.co";
const supabaseKey = "sb_publishable_pAUPbkDPg0EX45fjHGMAgQ_erEKCPXN";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function cadastrar(){

const { error } = await supabase
.from("pets")
.insert([{

Nome_pet: document.getElementById("nome").value,
Responsavel: document.getElementById("responsavel").value,
Whatsapp: document.getElementById("telefone").value,
Tipo_sanguineo: document.getElementById("tipo").value,
Alergias: document.getElementById("alergia").value,
Tratamentos: document.getElementById("tratamento").value,
Mensagem: document.getElementById("mensagem").value,
Foto: "",
tags: ""

}]);

if(error){
    alert("Erro: " + error.message);
    console.log(error);
    return;
}

alert("Cadastro salvo com sucesso!");

document.getElementById("nome").value="";
document.getElementById("responsavel").value="";
document.getElementById("telefone").value="";
document.getElementById("tipo").value="";
document.getElementById("alergia").value="";
document.getElementById("tratamento").value="";
document.getElementById("mensagem").value="";

}

</script>

</body>
</html>
